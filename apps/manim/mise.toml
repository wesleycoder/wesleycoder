[tools]
"github:xtool-org/xtool" = { version = "1.16.1", asset_pattern = "xtool.app.zip", bin_path = "xtool.app/Contents/MacOS", strip_components = 0 }
gradle = "latest"
java = "17"
nim = { version = "latest", postinstall = "nimble install -y --silent -d:release nimlsp" }
watchexec = "latest"

[hooks]
postinstall = "nimble install -yl --silent --depsOnly"

# Nim only tasks
[tasks.nim_clear]
run = """
nimble clean --silent
rm -rf build/nimcache
"""

[tasks.touch_wrappers]
description = "Smart cache invalidation: Touch wrapper .nim files if native files are newer"
run = """
find . -type f \\( -name "*.m" -o -name "*.c" -o -name "*.h" \\) | while read -r native_file; do
  wrapper="${native_file%.*}.nim"
  if [ -f "$wrapper" ] && [ "$native_file" -nt "$wrapper" ]; then
    touch "$wrapper"
  fi
done
"""

[tasks.dev]
usage = """
flag "-w --watch" help="Watch for changes"
arg "[args]..." help="Arguments to pass to nim"
"""
run = """CMD="nim r -d:debug --nimcache:build/nimcache src/manim.nim $usage_args"
if [ "${usage_watch:-false}" = "true" ]; then
  watchexec -qrc -e=nim -i="build/**" "$CMD"
else
  $CMD
fi
"""
depends = ["web_gen", "touch_wrappers"]

[tasks.nim_build]
run = "nimble build --silent"
depends = ["nim_clear", "web_gen"]

[tasks.run]
run = """
clear # clear the terminal
build/manim
jj metaedit --quiet -m "draft: run $(date -u +"%FT%TZ")"
"""
depends = ["nim_build"]

# Cross platform tasks
[tasks.clear]
run = """
nimble clean --silent
"""
depends = ["android_clear"]

[tasks.bundle]
run = """
jj metaedit --quiet -m "draft: bundle $(date -u +"%FT%TZ")"
"""
depends = ["web_build", "macos_bundle", "android_bundle", "nim_build"]

[tasks.web_dev]
usage = """
flag "-w --watch" help="Watch for changes"
"""
description = "Run web frontend and backend server in parallel"
run = """
if [ "${usage_watch:-false}" = "true" ]; then
  mise web_gen -w &
  mise web_server -w &
else
  mise web_gen -w &
  mise web_server &
fi
mise astro dev &
wait
"""

# Web tasks
[tasks.web_server]
usage = """
flag "-w --watch" help="Watch for changes"
"""
raw = false
run = """CMD="nim r -d:debug -d:server --nimcache:build/nimcache src/manim-server.nim"
if [ "${usage_watch:-false}" = "true" ]; then
  watchexec -qrc -e=nim -i "build/**" "$CMD"
else
  $CMD
fi
"""

[tasks.web_build]
run = "dx -A astro build --silent"
depends = ["web_gen"]

[tasks.astro]
run = "dx -A astro"

[tasks.web_gen]
usage = """
flag "-w --watch" help="Watch for changes"
arg "[output]" help="Output file for typescript RPC bindings"
"""
run = """
CMD="nim r -d:gen --nimcache:build/nimcache ${usage_output:+"-d:output=$usage_output"} src/manim-server.nim"
if [ "${usage_watch:-false}" = "true" ]; then
  watchexec -qrc -e=nim -i "build/**" "$CMD"
else
  $CMD
fi
"""

# MacOS tasks
[tasks.macos_bundle]
usage = """
flag "-o --open" help="Open the app after bundling"
"""
run = """
mkdir -p build/Manim.app/Contents/MacOS
mv build/manim build/Manim.app/Contents/MacOS/manim
cp -R macos/public/ build/Manim.app/
jj metaedit --quiet -m "macos_bundle: run $(date -u +"%FT%TZ")"
if [ "${usage_open:-false}" = "true" ]; then
  mise open
fi
"""
depends = ["nim_build"]

[tasks.open]
run = """
pkill -x manim || true
while pgrep -x manim > /dev/null; do
  sleep 0.2
done
sleep 0.2
open build/Manim.app
"""

# Android tasks
[tasks.android_setup]
run = """
sdkmanager "system-images;android-35;google_apis;arm64-v8a"
avdmanager create avd -n Pixel_API_35 -k "system-images;android-35;google_apis;arm64-v8a" --device "pixel"
"""

[tasks.android_run]
run = """
nohup emulator -avd Pixel_API_35 -qemu -append "hw.keyboard=yes hw.keyboard.lid=no" > /dev/null 2>&1 &
"""

[tasks.android_clear]
run = """
rm -rf android/build/ android/.gradle android/.kotlin android/app/.cxx android/app/build build/android_cache
cd android && ./gradlew clean -q || true
"""

[tasks.android_nim]
run = """
nim c --os:android src/manim.nim
NIM_LIB_DIR=$(nim dump 2>&1 | tail -n 1)
cp "$NIM_LIB_DIR/nimbase.h" build/android_cache/
"""
depends = ["clear", "web_build"]

[tasks.android_logs]
run = "(adb logcat | grep --line-buffered -i 'Manim')"

[tasks.android_install]
run = """
cd android
./gradlew installDebug -q
adb shell am start -n dev.guima.manim/.MainActivity
jj metaedit --quiet -m "draft: android_install $(date -u +"%FT%TZ")"
"""
depends = ["android_nim"]

[tasks.android_build]
run = "cd android && ./gradlew assembleDebug"
depends = ["android_nim"]

[tasks.android_bundle]
run = """
cd android
./gradlew assembleRelease
jj metaedit --quiet -m "draft: android_bundle $(date -u +"%FT%TZ")"
"""
depends = ["android_nim"]

[tasks.ios_clear]
run = """
rm -rf build/ios build/ios_cache
"""

[tasks.ios_nim]
run = """
mkdir -p build/ios
nim c --os:ios src/manim.nim
cp build/ios_cache/manim.h build/ios/
sed -i '' 's/extern "C" //g' build/ios/manim.h
NIM_LIB_DIR=$(nim dump 2>&1 | tail -n 1)
cp "$NIM_LIB_DIR/nimbase.h" build/ios/
"""
depends = ["ios_clear", "web_build"]

[tasks.ios_build]
description = "Compiles Swift and packages the raw iOS App Bundle"
run = """
APP_DIR="build/ios/Manim.app"
mkdir -p "$APP_DIR"
SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
export SDKROOT="$SDK_PATH"
unset LIBRARY_PATH
unset CPATH
swiftc \
  -parse-as-library \
  -sdk "$SDK_PATH" \
  -target arm64-apple-ios16.0-simulator \
  -import-objc-header ios/bridge.h \
  -I build/ios \
  -lc++ \
  ios/Main.swift build/ios/libmanim.a \
  -o "$APP_DIR/Manim"

sed -i '' 's|href="/|href="./|g' dist/index.html
sed -i '' 's|src="/|src="./|g' dist/index.html


cp -r dist/** "$APP_DIR/"
cp -r ios/public/** "$APP_DIR/"
"""
depends = ["ios_nim"]

[tasks.ios_run]
description = "Boot iOS Simulator and launch the app"
run = """
xcrun simctl boot "Manim_iOS" || true
open -a Simulator
"""

[tasks.ios_setup]
description = "Creates a dedicated iOS Simulator for Manim"
run = """
if xcrun simctl list devices | grep -q "Manim_iOS"; then
  exit 0
fi

xcrun simctl create "Manim_iOS" "iPhone 15" || {
  echo "❌ Could not create simulator. Make sure you have downloaded an iOS simulator in Xcode!"
  exit 1
}
"""

[tasks.ios_install]
usage = """
flag "-d --debug" help="Opens Safari Web Inspector after install"
"""
description = "Install and launch the app on the Manim simulator"
run = """
xcrun simctl install "Manim_iOS" build/ios/Manim.app
xcrun simctl launch "Manim_iOS" dev.guima.manim
jj metaedit --quiet -m "draft: ios_install $(date -u +"%FT%TZ")"
if [ "${usage_debug:-false}" = "true" ]; then
  sleep .5
  mise ios_debug
fi
"""
depends = ["ios_build"]

[tasks.ios_logs]
description = "Stream live logs from the iOS app"
run = """
xcrun simctl spawn "Manim_iOS" log stream --predicate 'processImagePath ENDSWITH "Manim" AND NOT subsystem BEGINSWITH "com.apple."'
"""

[tasks.linux_build]
description = "Compiles the Linux binary using a headless Docker container"
run = """
docker build -t manim-linux-builder -f Dockerfile.linux .
docker run --rm -v "$(pwd):/app" manim-linux-builder \
  bash -c "nim cpp -d:release \
  --passC:\\"\\$(pkg-config --cflags gtk+-3.0 webkit2gtk-4.0)\\" \
  --passL:\\"\\$(pkg-config --libs gtk+-3.0 webkit2gtk-4.0)\\" \
  --out:build/manim-linux \
  main.nim"

echo "✅ Linux binary compiled at build/manim-linux"
"""
