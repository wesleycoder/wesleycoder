[tools]
gradle = "latest"
java = "17"
nim = { version = "latest", postinstall = "nimble install -y --silent nph nimlangserver" }
watchexec = "latest"

[hooks]
postinstall = "nimble install -yl --silent --depsOnly"

# Nim only tasks
[tasks.nim_clear]
run = """
nimble clean --silent
"""

[tasks.dev]
usage = """
flag "-w --watch" help="Watch for changes"
arg "[args]..." help="Arguments to pass to nim"
"""
run = """# running nim r -d:debug manim.nim
CMD="nim r -d:debug manim.nim $usage_args"
if [ "${usage_watch:-false}" = "true" ]; then
  watchexec -c=reset -qre nim "$CMD"
else
  $CMD
fi
"""

[tasks.nim_build]
run = "nimble build --silent"
depends = ["nim_clear"]

[tasks.run]
run = """
clear # clear the terminal
build/manim
jj metaedit --quiet -m "draft: run $(date +%H:%M)"
"""
depends = ["nim_build"]

# Cross platform tasks
[tasks.clear]
run = """
nimble clean --silent
"""
depends = ["android_clear"]

[tasks.bundle]
run = """
jj metaedit --quiet -m "draft: bundle $(date +%H:%M)"
"""
depends = ["web_build", "macos_bundle", "android_bundle", "nim_build"]

[tasks.web_dev]
description = "Run web frontend and backend server in parallel"
run = [{ tasks = ["web_dev_astro", "web_dev_server"] }]

# Web tasks
[tasks.web_dev_astro]
raw = false
run = "dx -A astro dev"

[tasks.web_dev_server]
usage = """
flag "-w --watch" help="Watch for changes"
"""
raw = false
run = """CMD="nim r -d:debug -d:server manim.nim"
if [ "${usage_watch:-false}" = "true" ]; then
  watchexec -c=reset -qre nim "$CMD"
else
  $CMD
fi
"""

[tasks.web_build]
run = "dx -A astro build --silent"

[tasks.astro]
run = "dx -A astro"

[tasks.gen]
usage = """
flag "-w --watch" help="Watch for changes"
arg "[output]" help="Output file for typescript RPC bindings"
"""
run = """
CMD="nim r -d:gen ${usage_output:+"-d:output=$usage_output"} manim.nim"
if [ "${usage_watch:-false}" = "true" ]; then
  watchexec -c=reset -qre nim "$CMD"
else
  $CMD
fi
"""

# MacOS tasks
[tasks.macos_bundle]
usage = """
flag "-o --open" help="Open the app after bundling"
"""
run = """
mkdir -p build/Manim.app/Contents/MacOS
mv build/manim build/Manim.app/Contents/MacOS/manim
cp -R macos/public/ build/Manim.app/
jj metaedit --quiet -m "macos_bundle: run $(date +%H:%M)"
if [ "${usage_open:-false}" = "true" ]; then
  mise open
fi
"""
depends = ["nim_build"]

[tasks.open]
run = """
pkill -x manim || true
while pgrep -x manim > /dev/null; do
  sleep 0.2
done
sleep 0.2
open build/Manim.app
"""

# Android tasks
[tasks.android_emulator_create]
run = """
sdkmanager "system-images;android-35;google_apis;arm64-v8a"
avdmanager create avd -n Pixel_API_35 -k "system-images;android-35;google_apis;arm64-v8a" --device "pixel"
"""

[tasks.android_emulator_run]
run = """
nohup emulator -avd Pixel_API_35 -qemu -append "hw.keyboard=yes hw.keyboard.lid=no" > /dev/null 2>&1 &
"""

[tasks.android_clear]
run = """
rm -rf android/build/ android/.gradle android/.kotlin android/app/.cxx android/app/build build/android_cache
cd android && ./gradlew clean -q || true
"""

[tasks.android_nim]
run = """
nim c --os:android manim.nim
NIM_LIB_DIR=$(nim dump 2>&1 | tail -n 1)
cp "$NIM_LIB_DIR/nimbase.h" build/android_cache/
"""
depends = ["clear", "web_build"]

[tasks.android_logs]
run = "(adb logcat | grep -i 'Manim')"

[tasks.android_install]
run = """
cd android
./gradlew installDebug -q
adb shell am start -n dev.guima.manim/.MainActivity
jj metaedit --quiet -m "draft: android_install $(date +%H:%M)"
"""
depends = ["android_nim"]

[tasks.android_build]
run = "cd android && ./gradlew assembleDebug"
depends = ["android_nim"]

[tasks.android_bundle]
run = """
cd android
./gradlew assembleRelease
jj metaedit --quiet -m "draft: android_bundle $(date +%H:%M)"
"""
depends = ["android_nim"]
