[tools]
nim = { version = "latest", postinstall = "nimble install -y --silent nph nimlangserver" }
watchexec = "latest"

[hooks]
postinstall = "nimble install -yl --silent --depsOnly"

[tasks.clear]
run = "nimble clean --silent"

[tasks.build]
run = "nimble build --silent"
depends = ["clear"]

[tasks.bundle_macos]
run = """
nim c manim.nim
rm -rf dist/Manim.app
mkdir -p dist/Manim.app/Contents/MacOS
mv dist/manim dist/Manim.app/Contents/MacOS/manim
cp -R assets/ dist/Manim.app/
"""
depends = ["build"]

[tasks.bundle]
depends = ["bundle_macos"]

[tasks.dev]
usage = """
flag "-w --watch" help="Watch for changes"
"""
run = """# running nim r manim.nim
if [ "${usage_watch:-false}" = "true" ]; then
  watchexec -c=reset -w manim.nim -qe nim 'nim r manim.nim'
else
  nim r manim.nim
fi
"""

[tasks.run]
run = "clear;dist/manim"
depends = ["build"]

[tasks.open]
run = """
pkill -x manim || true
open dist/Manim.app
"""
